name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 3 days at 6:00 AM UTC
    - cron: '0 6 */3 * *'
  workflow_dispatch: {} # allows manual trigger from the Actions tab for testing

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/events?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Supabase responded with HTTP status: $response"

          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Supabase project is alive."
          else
            echo "⚠️ Unexpected response from Supabase. Check project status."
            exit 1
          fi
