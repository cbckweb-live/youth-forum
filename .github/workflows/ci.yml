name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Fail fast if any ESM-only package sneaks into the dep tree
      - name: Check for forbidden ESM-only transitive deps
        run: node scripts/check-esm-deps.mjs

      # Full production build — same Turbopack config as Vercel deploy
      - name: Production build
        run: npm run build

      # Start the production server and run HTTP smoke tests against it
      - name: HTTP smoke tests
        run: |
          npm start &
          SERVER_PID=$!
          npx wait-on http://localhost:3000 --timeout 30000
          LAUNCH_BYPASS_SECRET=${{ secrets.LAUNCH_BYPASS_SECRET }} \
            node tests/smoke.mjs
          kill $SERVER_PID

      # Start a fresh server for the browser-level console error smoke test.
      # The kill + lsof ensures any leftover server from the previous step is cleaned up.
      - name: Browser console smoke tests
        if: always()
        run: |
          kill $(lsof -ti:3000) 2>/dev/null || true
          npm start &
          SERVER_PID=$!
          npx wait-on http://localhost:3000 --timeout 30000
          LAUNCH_BYPASS_SECRET=${{ secrets.LAUNCH_BYPASS_SECRET }} \
            node tests/smoke-console.mjs
          kill $SERVER_PID 2>/dev/null || true

      # Start another fresh server for the interactive smoke tests (admin routes,
      # form interactions, login flow).
      - name: Browser interactive smoke tests
        if: always()
        run: |
          kill $(lsof -ti:3000) 2>/dev/null || true
          npm start &
          SERVER_PID=$!
          npx wait-on http://localhost:3000 --timeout 30000
          LAUNCH_BYPASS_SECRET=${{ secrets.LAUNCH_BYPASS_SECRET }} \
            node tests/smoke-interactive.mjs
          kill $SERVER_PID 2>/dev/null || true
